<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunset Sprint</title>
  <style>
    :root {
      --sky-top: #f3c36d;
      --sky-bottom: #f8f4e4;
      --panel: rgba(255, 248, 234, 0.82);
      --panel-border: rgba(87, 53, 22, 0.16);
      --ink: #2e2418;
      --accent: #c35d2a;
      --accent-soft: #f0b56a;
      --ground: #a9632a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.5), transparent 40%),
        linear-gradient(180deg, #f9d18d 0%, #f0a45a 38%, #d96d3d 65%, #7d4125 100%);
    }
    .game-shell {
      width: min(100%, 980px);
      padding: 20px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow:
        0 18px 45px rgba(77, 38, 17, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .title-group {
      display: grid;
      gap: 4px;
    }

    .eyebrow {
      letter-spacing: 0.24em;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(46, 36, 24, 0.65);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 0.95;
    }

    .subtitle {
      margin: 0;
      color: rgba(46, 36, 24, 0.75);
    }

    .scoreboard {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .score-card {
      min-width: 124px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(87, 53, 22, 0.12);
      text-align: right;
    }

    .score-card span {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(46, 36, 24, 0.55);
    }

    .score-card strong {
      display: block;
      margin-top: 4px;
      font-size: 1.45rem;
    }

    .ranking-panel {
      margin-top: 18px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 252, 245, 0.62);
      border: 1px solid rgba(87, 53, 22, 0.12);
    }

    .ranking-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .ranking-title {
      margin: 0;
      font-size: 1.1rem;
    }

    .ranking-note {
      margin: 0;
      font-size: 0.9rem;
      color: rgba(46, 36, 24, 0.62);
    }

    .ranking-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .ranking-item,
    .ranking-empty {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(87, 53, 22, 0.08);
    }

    .ranking-empty {
      grid-template-columns: 1fr;
      text-align: center;
      color: rgba(46, 36, 24, 0.68);
    }

    .ranking-position {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(180deg, #f3c36d 0%, #d78443 100%);
      color: #fff8ee;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .ranking-meta {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .ranking-label,
    .ranking-time {
      margin: 0;
    }

    .ranking-label {
      font-weight: 700;
    }

    .ranking-time {
      font-size: 0.84rem;
      color: rgba(46, 36, 24, 0.58);
    }

    .ranking-score {
      font-size: 1.05rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .game-stage {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 76%);
      border: 1px solid rgba(87, 53, 22, 0.14);
      box-shadow: inset 0 -24px 0 rgba(169, 99, 42, 0.12);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 6;
      touch-action: manipulation;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }

    .overlay-card {
      max-width: 420px;
      padding: 20px 24px;
      border-radius: 22px;
      background: rgba(255, 249, 239, 0.8);
      border: 1px solid rgba(87, 53, 22, 0.12);
      box-shadow: 0 12px 30px rgba(77, 38, 17, 0.16);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .overlay-card.hidden {
      opacity: 0;
      transform: translateY(10px);
    }

    .overlay-card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .overlay-card p {
      margin: 0;
      line-height: 1.5;
      color: rgba(46, 36, 24, 0.78);
    }

    .footer {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hint {
      color: rgba(46, 36, 24, 0.75);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      color: #fff8ee;
      background: linear-gradient(180deg, #cf6e2f 0%, #a44f22 100%);
      box-shadow: 0 10px 20px rgba(164, 79, 34, 0.24);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 22px rgba(164, 79, 34, 0.28);
    }

    button:active {
      transform: translateY(0);
    }


    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
      40%, 60% { transform: translate3d(6px, 0, 0); }
    }

    .shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .game-shell {
        padding: 14px;
        border-radius: 22px;
      }

      .score-card {
        min-width: 106px;
      }

      .ranking-item {
        grid-template-columns: auto 1fr;
      }

      .ranking-score {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="header">
      <div class="title-group">
        <div class="eyebrow">Mini Runner</div>
        <h1>Sunset Sprint</h1>
        <p class="subtitle">Google Dinoっぽく遊べる、シンプルな横スクロールゲーム。</p>
      </div>
      <div class="scoreboard">
        <div class="score-card">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
      </div>
    </section>

    <section class="game-stage">
      <canvas
        id="game"
        width="960"
        height="360"
        aria-label="Google Dino風のミニゲーム"
      ></canvas>
      <div class="overlay" aria-live="polite">
        <div class="overlay-card" id="overlayCard">
          <h2 id="overlayTitle">Space / ↑ でスタート</h2>
          <p id="overlayText">`Space` / `↑` / タップでジャンプ。`↓` でしゃがむ（空中では急降下します）。</p>
        </div>
      </div>
    </section>

    <section class="footer">
      <div class="hint">操作: `Space`/`↑`/タップでジャンプ。`↓`でしゃがむ。長押しで高く跳べます。</div>
      <button id="actionButton" type="button">ジャンプ / リスタート</button>
    </section>

    <section class="ranking-panel" aria-labelledby="rankingTitle">
      <div class="ranking-header">
        <h2 class="ranking-title" id="rankingTitle">スコアランキング</h2>
        <p class="ranking-note">このブラウザに上位5件まで保存されます。</p>
      </div>
      <ol class="ranking-list" id="rankingList">
        <li class="ranking-empty">まだスコア記録がありません。</li>
      </ol>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlayCard = document.getElementById("overlayCard");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const actionButton = document.getElementById("actionButton");
    const rankingListEl = document.getElementById("rankingList");

    const dpr = window.devicePixelRatio || 1;
    const WIDTH = 960;
    const HEIGHT = 360;
    canvas.width = WIDTH * dpr;
    canvas.height = HEIGHT * dpr;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    ctx.scale(dpr, dpr);
    const GROUND_Y = 286;
    const BEST_KEY = "sunset-sprint-best";
    const RANKING_KEY = "sunset-sprint-ranking";
    const MAX_RANKING_ITEMS = 5;
    const START_SPEED = 5.4;
    const SPEED_GAIN = 0.0016;
    const GRAVITY = 0.63;
    const JUMP_FORCE = 13.8;
    const MAX_JUMP_HOLD = 10.5;
    const JUMP_HOLD_BOOST = 0.34;
    const JUMP_RELEASE_GRAVITY = 0.38;
    const MAX_SPEED = 14.0;
    const FIXED_STEP_MS = 1000 / 60;
    const MAX_FRAME_DELTA_MS = 100;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      if (type === 'jump') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gainNode.gain.setValueAtTime(0.08, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } else if (type === 'score') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.setValueAtTime(880, now + 0.1);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      }
    }

    function loadBestScore() {
      try {
        return Number(localStorage.getItem(BEST_KEY) || 0);
      } catch (error) {
        return 0;
      }
    }

    function saveBestScore(value) {
      try {
        localStorage.setItem(BEST_KEY, Math.floor(value));
      } catch (error) {
        return;
      }
    }

    function loadRanking() {
      try {
        const savedRanking = JSON.parse(localStorage.getItem(RANKING_KEY) || "[]");
        if (!Array.isArray(savedRanking)) {
          return [];
        }

        return savedRanking
          .map((entry) => ({
            score: Math.floor(Number(entry?.score) || 0),
            playedAt: typeof entry?.playedAt === "string" ? entry.playedAt : ""
          }))
          .filter((entry) => entry.score > 0)
          .sort((a, b) => b.score - a.score || b.playedAt.localeCompare(a.playedAt))
          .slice(0, MAX_RANKING_ITEMS);
      } catch (error) {
        return [];
      }
    }

    function saveRanking(entries) {
      try {
        localStorage.setItem(RANKING_KEY, JSON.stringify(entries.slice(0, MAX_RANKING_ITEMS)));
      } catch (error) {
        return;
      }
    }

    function formatPlayedAt(value) {
      if (!value) {
        return "保存済みスコア";
      }

      const playedAt = new Date(value);
      if (Number.isNaN(playedAt.getTime())) {
        return "保存済みスコア";
      }

      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(playedAt);
    }

    function renderRanking(entries) {
      rankingListEl.replaceChildren();

      if (!entries.length) {
        const emptyItem = document.createElement("li");
        emptyItem.className = "ranking-empty";
        emptyItem.textContent = "まだスコア記録がありません。";
        rankingListEl.append(emptyItem);
        return;
      }

      entries.forEach((entry, index) => {
        const item = document.createElement("li");
        item.className = "ranking-item";

        const position = document.createElement("div");
        position.className = "ranking-position";
        position.textContent = String(index + 1);

        const meta = document.createElement("div");
        meta.className = "ranking-meta";

        const label = document.createElement("p");
        label.className = "ranking-label";
        label.textContent = `${index + 1}位の記録`;

        const time = document.createElement("p");
        time.className = "ranking-time";
        time.textContent = formatPlayedAt(entry.playedAt);

        const score = document.createElement("div");
        score.className = "ranking-score";
        score.textContent = `${entry.score} pts`;

        meta.append(label, time);
        item.append(position, meta, score);
        rankingListEl.append(item);
      });
    }

    function updateRanking(score) {
      const normalizedScore = Math.floor(score);
      if (normalizedScore <= 0) {
        return;
      }

      state.ranking = [...state.ranking, {
        score: normalizedScore,
        playedAt: new Date().toISOString()
      }]
        .sort((a, b) => b.score - a.score || b.playedAt.localeCompare(a.playedAt))
        .slice(0, MAX_RANKING_ITEMS);

      saveRanking(state.ranking);
      renderRanking(state.ranking);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function roundRectPath(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }

    function createCloud(initial = false) {
      return {
        x: initial ? random(60, WIDTH - 100) : WIDTH + random(30, 220),
        y: random(40, 140),
        size: random(28, 54),
        speed: random(0.35, 0.8)
      };
    }

    function createHill(initial = false, index = 0) {
      return {
        x: initial ? index * 220 - 40 : WIDTH + 180,
        width: random(180, 280),
        height: random(70, 120)
      };
    }

    function createGroundMark(initial = false, index = 0) {
      return {
        x: initial ? index * 80 : WIDTH + random(20, 80),
        width: random(24, 68)
      };
    }

    function createDust(x, y, burst = 4) {
      for (let i = 0; i < burst; i += 1) {
        state.dust.push({
          x,
          y,
          vx: random(-1.6, 1.6),
          vy: random(-2.2, -0.6),
          size: random(3, 6),
          life: random(18, 30)
        });
      }
    }

    const player = {
      x: 116,
      y: GROUND_Y - 64,
      width: 64,
      height: 64,
      vy: 0,
      grounded: true,
      jumpHoldTime: 0,
      ducking: false
    };

    const activeJumpInputs = new Set();
    const activeDuckInputs = new Set();

    let isPaused = false;

    const state = {
      started: false,
      gameOver: false,
      speed: START_SPEED,
      gravity: GRAVITY,
      jumpForce: JUMP_FORCE,
      score: 0,
      best: loadBestScore(),
      ranking: loadRanking(),
      frame: 0,
      spawnTimer: 0,
      nextSpawn: 88,
      obstacles: [],
      clouds: Array.from({ length: 5 }, () => createCloud(true)),
      hills: Array.from({ length: 6 }, (_, index) => createHill(true, index)),
      groundMarks: Array.from({ length: 16 }, (_, index) => createGroundMark(true, index)),
      dust: []
    };

    state.best = Math.max(state.best, state.ranking[0]?.score || 0);
    saveBestScore(state.best);
    bestEl.textContent = Math.floor(state.best);
    renderRanking(state.ranking);

    function resetGame() {
      state.started = false;
      state.gameOver = false;
      state.speed = START_SPEED;
      state.score = 0;
      state.frame = 0;
      state.spawnTimer = 0;
      state.nextSpawn = 88;
      state.obstacles = [];
      state.dust = [];
      player.y = GROUND_Y - player.height;
      player.vy = 0;
      player.grounded = true;
      player.jumpHoldTime = 0;
      player.ducking = false;
      scoreEl.textContent = "0";
      setOverlay(
        "Space / ↑ でスタート",
        "`Space` / `↑` / タップでジャンプ。`↓` でしゃがむ（空中では急降下します）。",
        true
      );
    }

    function setOverlay(title, text, visible) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayCard.classList.toggle("hidden", !visible);
    }

    function spawnObstacle() {
      const birdUnlocked = state.score > 280 && state.speed > 9.5;
      const spawnBird = birdUnlocked && Math.random() < 0.28;

      if (spawnBird) {
        const heights = [
          GROUND_Y - 110, // High (jump hits it, run under it)
          GROUND_Y - 70,  // Medium (must duck)
          GROUND_Y - 34   // Low (must jump)
        ];
        const birdY = heights[Math.floor(Math.random() * heights.length)];
        state.obstacles.push({
          type: "bird",
          x: WIDTH + random(20, 90),
          y: birdY,
          width: 64,
          height: 38
        });
        return;
      }

      const size = Math.random();
      const segments = size > 0.7 ? 3 : size > 0.36 ? 2 : 1;
      state.obstacles.push({
        type: "cactus",
        x: WIDTH + random(20, 80),
        y: GROUND_Y,
        width: 20 + segments * 16,
        height: random(44, 88),
        segments
      });
    }

    function getPlayerHitbox() {
      if (player.ducking) {
        return {
          x: player.x + 10,
          y: player.y + 34,
          width: player.width - 2,
          height: player.height - 34
        };
      }
      return {
        x: player.x + 10,
        y: player.y + 8,
        width: player.width - 18,
        height: player.height - 10
      };
    }

    function getObstacleHitbox(obstacle) {
      if (obstacle.type === "bird") {
        return {
          x: obstacle.x + 4,
          y: obstacle.y + 7,
          width: obstacle.width - 8,
          height: obstacle.height - 14
        };
      }

      return {
        x: obstacle.x + 4,
        y: obstacle.y - obstacle.height,
        width: obstacle.width - 8,
        height: obstacle.height
      };
    }

    function intersects(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function jump() {
      if (!player.grounded || player.ducking) {
        return;
      }
      
      playSound('jump');
      player.vy = -state.jumpForce;
      player.grounded = false;
      player.jumpHoldTime = 0;
      createDust(player.x + 18, GROUND_Y - 6, 6);
    }

    function beginAction(inputId, type = "jump") {
      if (type === "duck") {
        activeDuckInputs.add(inputId);
        return;
      }

      if (activeJumpInputs.has(inputId)) {
        return;
      }

      activeJumpInputs.add(inputId);

      if (isPaused) {
        isPaused = false;
        previousTime = performance.now();
        accumulatedTime = 0;
        setOverlay("", "", false);
        return;
      }

      if (state.gameOver) {
        resetGame();
        state.started = true;
        setOverlay("", "", false);
        jump();
        return;
      }

      if (!state.started) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        state.started = true;
        setOverlay("", "", false);
      }

      jump();
    }

    function endAction(inputId, type = "jump") {
      if (type === "duck") {
        activeDuckInputs.delete(inputId);
      } else {
        activeJumpInputs.delete(inputId);
      }
    }

    function endGame() {
      state.gameOver = true;
      state.started = false;
      activeJumpInputs.clear();
      activeDuckInputs.clear();
      state.best = Math.max(state.best, state.score);
      saveBestScore(state.best);
      bestEl.textContent = Math.floor(state.best);
      updateRanking(state.score);
      setOverlay(
        "Game Over",
        "もう一度走るには `Space` / `↑` / タップ。`↓`でしゃがみます。",
        true
      );
      createDust(player.x + player.width * 0.6, player.y + player.height, 14);
      
      playSound('hit');
      const gameStage = document.querySelector('.game-stage');
      gameStage.classList.add('shake');
      setTimeout(() => gameStage.classList.remove('shake'), 400);
    }

    function updateWorld(speed, dt) {
      const groundSpeed = (state.started && !state.gameOver ? speed : 0) * dt;
      const cloudSpeed = (state.started && !state.gameOver ? speed * 0.16 : 0.28) * dt;
      const hillSpeed = (state.started && !state.gameOver ? speed * 0.28 : 0.16) * dt;

      for (const cloud of state.clouds) {
        cloud.x -= cloud.speed * cloudSpeed;
        if (cloud.x < -120) {
          Object.assign(cloud, createCloud());
        }
      }

      for (const hill of state.hills) {
        hill.x -= hillSpeed;
        if (hill.x + hill.width < 0) {
          Object.assign(hill, createHill());
        }
      }

      for (const mark of state.groundMarks) {
        mark.x -= groundSpeed;
        if (mark.x + mark.width < 0) {
          Object.assign(mark, createGroundMark());
        }
      }
    }

    function updateDust(dt) {
      state.dust = state.dust.filter((particle) => {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 0.08 * dt;
        particle.life -= dt;
        return particle.life > 0;
      });
    }

    function update() {
      const dt = 1;
      state.frame += dt;
      updateWorld(state.speed, dt);
      updateDust(dt);

      if (!state.started || state.gameOver) {
        return;
      }

      player.ducking = activeDuckInputs.size > 0;

      state.speed = Math.min(state.speed + SPEED_GAIN * dt, MAX_SPEED);
      const oldScoreFloor = Math.floor(state.score);
      state.score += state.speed * 0.115 * dt;
      const newScoreFloor = Math.floor(state.score);
      
      if (newScoreFloor > oldScoreFloor && newScoreFloor % 100 === 0 && newScoreFloor > 0) {
        playSound('score');
      }
      
      scoreEl.textContent = newScoreFloor;

      player.vy += state.gravity * dt;

      if (player.ducking && !player.grounded) {
        player.vy += 1.8 * dt;
      }

      if (!player.grounded && player.vy < 0) {
        if (activeJumpInputs.size > 0 && player.jumpHoldTime < MAX_JUMP_HOLD && !player.ducking) {
          player.vy -= JUMP_HOLD_BOOST * dt;
          player.jumpHoldTime += dt;
        } else if (activeJumpInputs.size === 0 || player.ducking) {
          player.vy += JUMP_RELEASE_GRAVITY * dt;
        }
      }

      player.y += player.vy * dt;

      if (player.y >= GROUND_Y - player.height) {
        if (!player.grounded) {
          createDust(player.x + 16, GROUND_Y - 4, 5);
        }
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.grounded = true;
        player.jumpHoldTime = 0;
      }

      state.spawnTimer += dt;
      if (state.spawnTimer >= state.nextSpawn) {
        spawnObstacle();
        state.spawnTimer = 0;
        state.nextSpawn = random(52, 88) / (state.speed / 6.4);
      }

      for (const obstacle of state.obstacles) {
        obstacle.x -= state.speed * dt;
      }

      state.obstacles = state.obstacles.filter((obstacle) => obstacle.x + obstacle.width > -40);

      const playerHitbox = getPlayerHitbox();
      for (const obstacle of state.obstacles) {
        if (intersects(playerHitbox, getObstacleHitbox(obstacle))) {
          endGame();
          break;
        }
      }
    }

    function drawSun() {
      const sunX = WIDTH - 150;
      const sunY = 86;
      const sunRadius = 42;

      ctx.save();
      ctx.fillStyle = "rgba(255, 242, 198, 0.92)";
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 245, 214, 0.42)";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunRadius + 14, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawCloud(cloud) {
      ctx.save();
      ctx.fillStyle = "rgba(255, 250, 240, 0.72)";
      ctx.beginPath();
      ctx.arc(cloud.x, cloud.y, cloud.size * 0.38, 0, Math.PI * 2);
      ctx.arc(cloud.x + cloud.size * 0.34, cloud.y - 7, cloud.size * 0.28, 0, Math.PI * 2);
      ctx.arc(cloud.x + cloud.size * 0.62, cloud.y + 3, cloud.size * 0.32, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHill(hill, index) {
      const yBase = GROUND_Y + 8;
      ctx.save();
      ctx.fillStyle = index % 2 === 0 ? "rgba(163, 102, 57, 0.28)" : "rgba(137, 81, 45, 0.2)";
      ctx.beginPath();
      ctx.moveTo(hill.x, yBase);
      ctx.quadraticCurveTo(hill.x + hill.width * 0.25, yBase - hill.height, hill.x + hill.width * 0.5, yBase);
      ctx.quadraticCurveTo(hill.x + hill.width * 0.75, yBase - hill.height * 0.88, hill.x + hill.width, yBase);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawGround() {
      ctx.save();
      ctx.fillStyle = "#b36a2f";
      ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);

      ctx.fillStyle = "rgba(134, 72, 30, 0.22)";
      for (const mark of state.groundMarks) {
        ctx.fillRect(mark.x, GROUND_Y + 28, mark.width, 5);
      }

      ctx.strokeStyle = "#7d4521";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(WIDTH, GROUND_Y);
      ctx.stroke();
      ctx.restore();
    }

    function drawDustParticles() {
      ctx.save();
      ctx.fillStyle = "rgba(126, 69, 28, 0.35)";
      for (const particle of state.dust) {
        ctx.globalAlpha = Math.max(0.12, particle.life / 30);
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawPlayer() {
      const runCycle = player.grounded ? Math.sin(state.frame * 0.35) : 0;
      const bodyY = player.y + (state.started ? 0 : Math.sin(state.frame * 0.05) * 2);

      ctx.save();
      ctx.translate(player.x, bodyY);

      ctx.fillStyle = "#2f2418";

      if (player.ducking && player.grounded) {
        ctx.beginPath();
        ctx.moveTo(34, 44);
        ctx.lineTo(16, 36);
        ctx.lineTo(36, 30);
        ctx.closePath();
        ctx.fill();

        roundRectPath(ctx, 4, 30, 44, 20, 8);
        ctx.fill();

        roundRectPath(ctx, 46, 26, 28, 20, 8);
        ctx.fill();

        ctx.fillStyle = "#fff6ea";
        ctx.fillRect(58, 30, 4, 4);

        ctx.fillStyle = "#2f2418";
        const legSwing = player.grounded ? runCycle * 10 : -4;
        ctx.fillRect(18, 50, 8, 14 + legSwing);
        ctx.fillRect(34, 50, 8, 14 - legSwing);
        ctx.fillRect(18, 64 + legSwing, 16, 6);
        ctx.fillRect(34, 64 - legSwing, 16, 6);
      } else {
        ctx.beginPath();
        ctx.moveTo(8, 44);
        ctx.lineTo(-10, 36);
        ctx.lineTo(10, 30);
        ctx.closePath();
        ctx.fill();

        roundRectPath(ctx, 12, 20, 32, 28, 10);
        ctx.fill();

        roundRectPath(ctx, 34, 2, 24, 28, 8);
        ctx.fill();

        ctx.fillRect(56, 12, 10, 8);
        ctx.fillRect(24, 10, 10, 16);

        ctx.fillStyle = "#fff6ea";
        ctx.fillRect(47, 10, 4, 4);

        ctx.fillStyle = "#2f2418";
        const legSwing = player.grounded ? runCycle * 10 : -4;
        ctx.fillRect(18, 46, 8, 18 + legSwing);
        ctx.fillRect(34, 46, 8, 18 - legSwing);
        ctx.fillRect(18, 62 + legSwing, 16, 6);
        ctx.fillRect(34, 62 - legSwing, 16, 6);
      }

      ctx.restore();
    }

    function drawCactus(obstacle) {
      const x = obstacle.x;
      const y = obstacle.y;
      const stemWidth = 16;

      ctx.save();
      ctx.fillStyle = "#356a46";

      for (let i = 0; i < obstacle.segments; i += 1) {
        const segmentX = x + i * 16;
        const segmentHeight = obstacle.height - (i % 2 === 0 ? 0 : 12);
        roundRectPath(ctx, segmentX, y - segmentHeight, stemWidth, segmentHeight, 8);
        ctx.fill();
        ctx.fillRect(segmentX - 6, y - segmentHeight + 16, 6, 12);
        ctx.fillRect(segmentX + stemWidth, y - segmentHeight + 28, 6, 12);
      }

      ctx.restore();
    }

    function drawBird(obstacle) {
      const flap = Math.sin((state.frame + obstacle.x) * 0.18) * 8;

      ctx.save();
      ctx.translate(obstacle.x, obstacle.y);
      ctx.fillStyle = "#584438";

      ctx.beginPath();
      ctx.ellipse(30, 18, 18, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillRect(42, 14, 16, 6);
      ctx.fillRect(14, 10, 8, 8);

      ctx.beginPath();
      ctx.moveTo(18, 16);
      ctx.lineTo(0, 12 + flap);
      ctx.lineTo(12, 22);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(34, 18);
      ctx.lineTo(12, 22 - flap);
      ctx.lineTo(26, 28);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#fff6ea";
      ctx.fillRect(46, 15, 3, 3);
      ctx.restore();
    }

    function drawObstacle(obstacle) {
      if (obstacle.type === "bird") {
        drawBird(obstacle);
      } else {
        drawCactus(obstacle);
      }
    }

    function drawScoreMarkers() {
      ctx.save();
      ctx.fillStyle = "rgba(46, 36, 24, 0.3)";
      ctx.font = "700 16px Trebuchet MS";
      ctx.fillText("JUMP", 56, 36);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);

      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, "#f4c96f");
      sky.addColorStop(0.52, "#f8ddb1");
      sky.addColorStop(1, "#f9f4e8");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawSun();
      state.clouds.forEach(drawCloud);
      state.hills.forEach(drawHill);
      drawGround();
      drawDustParticles();
      state.obstacles.forEach(drawObstacle);
      drawPlayer();
      drawScoreMarkers();

      if (state.gameOver) {
        ctx.save();
        ctx.fillStyle = "rgba(46, 36, 24, 0.08)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.restore();
      }
    }

    let previousTime = performance.now();
    let accumulatedTime = 0;

    function loop(now) {
      const delta = Math.min(now - previousTime, MAX_FRAME_DELTA_MS);
      previousTime = now;

      if (!isPaused) {
        accumulatedTime += delta;
        while (accumulatedTime >= FIXED_STEP_MS) {
          update();
          accumulatedTime -= FIXED_STEP_MS;
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "ArrowUp") {
        event.preventDefault();
        beginAction(`key-${event.code}`, "jump");
      } else if (event.code === "ArrowDown") {
        event.preventDefault();
        beginAction(`key-${event.code}`, "duck");
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "Space" || event.code === "ArrowUp") {
        endAction(`key-${event.code}`, "jump");
      } else if (event.code === "ArrowDown") {
        endAction(`key-${event.code}`, "duck");
      }
    });

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      canvas.setPointerCapture(event.pointerId);
      beginAction(`canvas-${event.pointerId}`);
    });

    canvas.addEventListener("pointerup", (event) => {
      endAction(`canvas-${event.pointerId}`);
    });

    canvas.addEventListener("pointercancel", (event) => {
      endAction(`canvas-${event.pointerId}`);
    });

    actionButton.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      actionButton.setPointerCapture(event.pointerId);
      beginAction(`button-${event.pointerId}`);
    });

    actionButton.addEventListener("pointerup", (event) => {
      endAction(`button-${event.pointerId}`);
    });

    actionButton.addEventListener("pointercancel", (event) => {
      endAction(`button-${event.pointerId}`);
    });

    window.addEventListener("blur", () => {
      activeJumpInputs.clear();
      activeDuckInputs.clear();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && state.started && !state.gameOver) {
        isPaused = true;
        setOverlay("一時停止", "画面をタップするかSpaceキーで再開します", true);
      }
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
